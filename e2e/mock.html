<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playwright Mock Harness</title>
</head>
<body>
  <main id="mock-root">
    Mock translation harness used for automated browser tests on an English page.
  </main>
  <script>
    (() => {
      const providers = new Map();

      function registerDefaultProviders() {
        providers.set('mock', {
          async translate({ text = '', target = 'translated' } = {}) {
            return { text: `${text}-${target}` };
          },
        });
      }

      const defaultCache = {
        cacheReady: Promise.resolve(),
        get: () => null,
        set: () => {},
        remove: () => {},
        clear: () => {},
        size: () => 0,
        setLimit: () => {},
        setTTL: () => {},
      };

      function getProvider(providerId) {
        const provider = providers.get(providerId);
        if (!provider) {
          throw new Error(`Unknown provider: ${providerId}`);
        }
        return provider;
      }

      const mockHarness = {
        providers: {
          register(providerId, provider) {
            providers.set(providerId, provider);
          },
          get: getProvider,
          list() {
            return [...providers.keys()];
          },
          reset() {
            providers.clear();
            registerDefaultProviders();
          },
        },
        cache: defaultCache,
        clearCache() {
          mockHarness.cache.clear();
        },
        loadConfig: async () => ({ providerOrder: [], debug: false }),
        saveConfig: async () => {},
        async translate(opts = {}) {
          const providerOrder = Array.isArray(opts.providerOrder) && opts.providerOrder.length > 0
            ? opts.providerOrder
            : opts.provider
              ? [opts.provider]
              : [];

          let lastError = null;
          for (const providerId of providerOrder) {
            try {
              return await getProvider(providerId).translate({ ...opts, provider: providerId });
            } catch (error) {
              lastError = error;
            }
          }

          throw lastError ?? new Error('No provider available');
        },
        async translateBatch({ texts = [], ...opts } = {}) {
          const results = [];
          for (const text of texts) {
            const translated = await mockHarness.translate({ ...opts, text });
            results.push(translated.text);
          }
          return { texts: results };
        },
        async translateStream(opts = {}, onData) {
          const provider = getProvider(opts.provider);
          return provider.translate({ ...opts, onData, stream: true });
        },
      };

      window.mockHarness = mockHarness;

      registerDefaultProviders();
    })();
  </script>
</body>
</html>
