name: Sign Chrome Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Decode signing key
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          echo "$CRX_PRIVATE_KEY" | base64 -d > key.pem
      - name: Pack and sign
        run: |
          npx -y crx pack dist -o translate-by-mikko-extension.crx --zip-output translate-by-mikko-extension.zip -p key.pem
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signed-extension
          path: |
            translate-by-mikko-extension.crx
            translate-by-mikko-extension.zip
      - run: rm key.pem
