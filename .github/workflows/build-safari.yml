name: Build Safari

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch or tag)'
        required: false
        default: 'main'
  push:
    tags:
      - 'v*'

jobs:
  convert:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Convert to Safari projects
        run: |
          bash scripts/convert-safari.sh

      - name: Zip Safari projects
        run: |
          set -euo pipefail
          cd safari
          for d in */ ; do
            [ -d "$d" ] || continue
            name=$(echo "$d" | sed 's/[\/ ]/_/g; s/_$//')
            zip -r "../${name}.zip" "$d"
          done
          find .. -mindepth 1 -maxdepth 1 -print | sort | sed -n '1,200p'

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: safari-projects
          path: |
            *.zip

      - name: Upload to GitHub Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

