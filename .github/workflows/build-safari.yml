name: Build Safari

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch or tag)'
        required: false
        default: 'main'
  push:
    tags:
      - 'v*'

# TX-04-shape (MIK-2973 follow-up): explicit workflow-level least-privilege permissions
permissions:
  contents: write

jobs:
  convert:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Convert to Safari projects
        run: |
          bash scripts/convert-safari.sh

      - name: Zip Safari projects
        run: |
          set -euo pipefail
          cd safari
          for d in */ ; do
            [ -d "$d" ] || continue
            name=$(echo "$d" | sed 's/[\/ ]/_/g; s/_$//')
            zip -r "../${name}.zip" "$d"
          done
          ls -la .. | sed -n '1,200p'

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safari-projects
          path: |
            *.zip

      - name: Upload to GitHub Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

