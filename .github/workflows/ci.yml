name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate core quality gates
        run: npm run validate:ci
        env:
          CI: true

      - name: Build dist and check bundle size
        run: npm run validate:build

      - name: Build ZIP artifact
        run: npm run zip

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: translate-by-mikko-zip
          path: dist/*.zip

  changes:
    runs-on: ubuntu-latest
    outputs:
      pdf: ${{ steps.filter.outputs.pdf }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pdf:
              - 'src/pdfjs-entry.ts'
              - 'src/pdfjs-entry.test.ts'
              - 'src/content/pdf-loader.ts'
              - 'src/content/pdf-loader.test.ts'
              - 'src/content/pdf-translator.ts'
              - 'src/content/pdf-translator.test.ts'
              - 'src/content/index.ts'
              - 'src/content/index.test.ts'

  e2e-web:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e web smoke
        run: BACKGROUND=false npm run test:e2e:web:smoke
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-web
          path: playwright-report

  e2e-pdf:
    needs: [build-and-test, changes]
    if: needs.changes.outputs.pdf == 'true' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-pdf-tests'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run PDF module tests
        run: npm run test:pdf

  automerge:
    needs: [build-and-test, e2e-web]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge if supported
        run: |
          gh pr merge --auto --squash "$PR_URL" \
            && echo "Auto-merge enabled" \
            || echo "Auto-merge not allowed; skipping"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
