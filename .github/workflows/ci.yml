name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

# TX-04-shape (MIK-2973 follow-up): explicit workflow-level least-privilege permissions
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      # Secret scanning gate lives solely in .github/workflows/gitleaks.yml now.
      # It ran here too (duplicate gitleaks/gitleaks-action invocation, same
      # ruleset, same commit) on every single push/PR — pure waste, zero added
      # coverage. Removing this copy does not reduce secret-scan coverage:
      # gitleaks.yml still runs on the same push/pull_request triggers.

      - name: Validate core quality gates
        run: npm run validate:ci
        env:
          CI: true

      - name: Build dist and check bundle size
        run: npm run validate:build

      - name: Build ZIP artifact
        run: npm run zip

      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

      - name: Upload zip
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: translate-by-mikko-zip
          path: dist/*.zip

  changes:
    runs-on: ubuntu-latest
    outputs:
      pdf: ${{ steps.filter.outputs.pdf }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            pdf:
              - 'src/pdfjs-entry.ts'
              - 'src/pdfjs-entry.test.ts'
              - 'src/content/pdf-loader.ts'
              - 'src/content/pdf-loader.test.ts'
              - 'src/content/pdf-translator.ts'
              - 'src/content/pdf-translator.test.ts'
              - 'src/content/index.ts'
              - 'src/content/index.test.ts'
            code:
              - 'src/**'
              - 'e2e/**'
              - 'package.json'
              - 'package-lock.json'
              - 'playwright.config*'
              - 'vite.config*'
              - 'tsconfig*.json'
              - '.github/workflows/ci.yml'

  # e2e-web is NOT a required status check (only build-and-test is). Skipping
  # it on doc/README/policy-only diffs cuts ~2-3min of runner time (Playwright
  # install + browser boot) per such PR with zero coverage loss: nothing under
  # src/e2e/config changed, so there is nothing new for the smoke suite to
  # exercise. Falls through to a real run for any code/config change,
  # including on push to any branch (changes.outputs.code covers push too).
  e2e-web:
    needs: [build-and-test, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Verify dist artifact layout
        run: test -f dist/manifest.json && test -f dist/src/popup/index.html

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e web smoke
        run: BACKGROUND=false npm run test:e2e:web:smoke
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-web
          path: playwright-report

  e2e-pdf:
    needs: [build-and-test, changes]
    if: needs.changes.outputs.pdf == 'true' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-pdf-tests'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run PDF module tests
        run: npm run test:pdf

  automerge:
    needs: [build-and-test, e2e-web]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge if supported
        run: |
          gh pr merge --auto --squash "$PR_URL" \
            && echo "Auto-merge enabled" \
            || echo "Auto-merge not allowed; skipping"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
