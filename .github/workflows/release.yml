name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # Dependency-vulnerability backstop. ci.yml gates PRs on
  # `npm audit --audit-level=high` (HIGH+ only). This gate has no severity
  # threshold — it fails on ANY known, fixable vuln in package-lock.json — and
  # runs on the push-to-main release path so nothing publishes to npm / cuts a
  # GitHub release while a fix is available but unmerged. Accepted/unfixable
  # vulns are time-boxed in .github/osv-scanner.toml.
  security-gate:
    name: Security gate (block release on known vulns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Scan npm dependencies against OSV
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=.github/osv-scanner.toml
            --recursive
            ./

  release:
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Inject Extension ID
        # TX-02: EXTENSION_ID passed via env var, not inline interpolation.
        # Inline ${{ secrets.EXTENSION_ID }} in a run: string is a script-injection
        # anti-pattern — special characters in the value break the sed command.
        # Additionally escape sed replacement metacharacters (`/`, `&`, `\`) so a
        # value containing them cannot terminate the substitution early or inject
        # additional sed commands.
        env:
          EXTENSION_ID: ${{ secrets.EXTENSION_ID }}
        run: |
          if [ ! -f updates.xml ]; then
            echo "updates.xml not present in the repo — skipping extension-ID injection."
            echo "This step targets a self-hosted Chrome auto-update manifest; the active"
            echo "release path publishes via changesets/npm. Add an updates.xml template"
            echo "with the YOUR_EXTENSION_ID placeholder to re-enable injection."
            exit 0
          fi
          escaped_id=$(printf '%s' "$EXTENSION_ID" | sed -e 's/[\/&\\]/\\&/g')
          sed -i "s/YOUR_EXTENSION_ID/${escaped_id}/g" updates.xml
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1 branch
        with:
          # Gate npm publish on NPM_TOKEN: when the secret is set, publish to
          # npm; when absent, skip with a notice (exit 0) so the release still
          # versions + creates the GitHub release instead of failing ENEEDAUTH.
          publish: bash .github/scripts/changesets-publish.sh
          # NOTE: input is the plural 'createGithubReleases'. The previous
          # 'createGithubRelease' (singular) was silently ignored by the action
          # (logged 'Unexpected input'), so GitHub releases were never created.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
