name: PDF Regression

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/pdfjs-entry.ts'
      - 'src/pdfjs-entry.test.ts'
      - 'src/content/pdf-loader.ts'
      - 'src/content/pdf-loader.test.ts'
      - 'src/content/pdf-translator.ts'
      - 'src/content/pdf-translator.test.ts'
      - 'src/content/index.ts'
      - 'src/content/index.test.ts'
      - 'e2e/pdfs/**'
      - '.github/workflows/e2e.yml'
      - 'package.json'

# TX-04-shape (MIK-2973 follow-up): explicit workflow-level least-privilege permissions
permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache WASM assets
        id: wasm-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: src/wasm/vendor
          key: ${{ runner.os }}-wasm-${{ hashFiles('scripts/fetch-wasm-assets.sh') }}

      - name: Install deps
        run: npm ci

      - name: Check repo for public PDFs at root (privacy)
        run: |
          set -euo pipefail
          found=$(git ls-files '*.pdf' | grep -E '^[^/]+\.pdf$' || true)
          if [ -n "$found" ]; then
            echo "Found public PDFs at repository root (disallowed):" >&2
            echo "$found" >&2
            exit 1
          fi

      - name: Run PDF module tests
        run: npm run test:pdf

      # Privacy: do not upload screenshots or artifacts by default to avoid exposing PDFs/PII
