name: Dev Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    env:
      EXTENSION_ID: ${{ secrets.EXTENSION_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Decode, sign, and clean
        # TX-01: key.pem is removed via EXIT trap even if signing fails mid-step.
        # Previously rm was a separate step; a signing failure would leave key.pem
        # on disk and risk inclusion in any subsequent artifact upload.
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          trap "rm -f key.pem" EXIT
          echo "$CRX_PRIVATE_KEY" | base64 -d > key.pem
          VERSION=$(jq -r .version src/manifest.json)
          NAME="translate-by-mikko-extension-${VERSION}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "NAME=$NAME" >> "$GITHUB_ENV"
          npx -y crx pack dist -o "$NAME.crx" --zip-output "$NAME.zip" -p key.pem
          # NOTE: CRX_PRIVATE_KEY secret rotation steps (TX-01):
          #   1. Generate new key: openssl genrsa -out new_key.pem 2048
          #   2. base64-encode: base64 -i new_key.pem | tr -d '\n'
          #   3. Update repo secret CRX_PRIVATE_KEY with the encoded value
          #   4. Revoke/replace old key in Chrome Web Store developer settings
          # The old key is not revocable from GHA; only the CWS developer
          # dashboard controls which key is trusted for your extension ID.
      - name: Prepare update files
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<gupdate xmlns="http://www.google.com/update2/response" protocol="2.0">' \
            "  <app appid=\"${EXTENSION_ID}\">" \
            "    <updatecheck codebase=\"https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/${NAME}.crx\" version=\"${VERSION}\" />" \
            '  </app>' \
            '</gupdate>' > updates.xml
      - name: Commit update files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add updates.xml "${NAME}.crx" "${NAME}.zip"
          git commit -m "chore: update dev build [skip ci]" || echo "No changes to commit"
          git push
      # key.pem cleanup is handled by the EXIT trap in the 'Decode, sign, and clean' step above.
