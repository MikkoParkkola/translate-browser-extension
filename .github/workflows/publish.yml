name: Dev Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Dependency-vulnerability backstop for the dev-build publish path. publish.yml
  # signs a CRX and commits updates.xml, which is what installed extensions pull
  # auto-updates from — so a vulnerable dependency would ship straight to users.
  # Same lockfile-based OSV scan as the release gate; no severity threshold.
  # Accepted/unfixable vulns are time-boxed in .github/osv-scanner.toml.
  security-gate:
    name: Security gate (block dev build on known vulns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Scan npm dependencies against OSV
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=.github/osv-scanner.toml
            --recursive
            ./

  build:
    needs: security-gate
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    env:
      EXTENSION_ID: ${{ secrets.EXTENSION_ID }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Detect CRX signing key
        id: signing
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          if [ -n "$CRX_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CRX_PRIVATE_KEY secret is not set - skipping self-hosted CRX sign + updates.xml commit. The extension build itself succeeded; only the opt-in self-host distribution path is skipped. Set CRX_PRIVATE_KEY (base64-encoded RSA key matching the Chrome Web Store extension ID) to enable it."
          fi
      - name: Decode, sign, and clean
        if: steps.signing.outputs.enabled == 'true'
        # TX-01: key.pem is removed via EXIT trap even if signing fails mid-step.
        # Previously rm was a separate step; a signing failure would leave key.pem
        # on disk and risk inclusion in any subsequent artifact upload.
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          trap "rm -f key.pem" EXIT
          echo "$CRX_PRIVATE_KEY" | base64 -d > key.pem
          VERSION=$(jq -r .version src/manifest.json)
          NAME="translate-by-mikko-extension-${VERSION}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "NAME=$NAME" >> $GITHUB_ENV
          npx -y crx pack dist -o "$NAME.crx" --zip-output "$NAME.zip" -p key.pem
          # NOTE: CRX_PRIVATE_KEY secret rotation steps (TX-01):
          #   1. Generate new key: openssl genrsa -out new_key.pem 2048
          #   2. base64-encode: base64 -i new_key.pem | tr -d '\n'
          #   3. Update repo secret CRX_PRIVATE_KEY with the encoded value
          #   4. Revoke/replace old key in Chrome Web Store developer settings
          # The old key is not revocable from GHA; only the CWS developer
          # dashboard controls which key is trusted for your extension ID.
      - name: Prepare update files
        if: steps.signing.outputs.enabled == 'true'
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<gupdate xmlns="http://www.google.com/update2/response" protocol="2.0">' \
            "  <app appid=\"${EXTENSION_ID}\">" \
            "    <updatecheck codebase=\"https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/${NAME}.crx\" version=\"${VERSION}\" />" \
            '  </app>' \
            '</gupdate>' > updates.xml
      - name: Commit update files
        if: steps.signing.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add updates.xml "${NAME}.crx" "${NAME}.zip"
          git commit -m "chore: update dev build [skip ci]" || echo "No changes to commit"
          git push
      # key.pem cleanup is handled by the EXIT trap in the 'Decode, sign, and clean' step above.
